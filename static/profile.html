<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTArchive - Profile</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .profile-header h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
        }

        .avatar-section {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .avatar-preview:hover {
            transform: scale(1.05);
        }

        .avatar-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 600;
            border: 4px solid #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            color: white;
        }

        .avatar-placeholder:hover {
            transform: scale(1.05);
        }

        .avatar-controls h3 {
            margin-bottom: 15px;
            color: #667eea;
            font-size: 20px;
        }

        .avatar-buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .btn-upload, .btn-remove {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-upload:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-remove {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 2px solid rgba(255, 68, 68, 0.3);
        }

        .btn-remove:hover {
            background: rgba(255, 68, 68, 0.3);
            transform: translateY(-3px);
        }

        .form-section h3 {
            margin-bottom: 25px;
            color: #667eea;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #aaa;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .role-display {
            padding: 10px 20px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            display: inline-block;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100());
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5);
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            margin: 40px 0;
        }

        .danger-zone {
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid rgba(255, 68, 68, 0.3);
            border-radius: 15px;
            padding: 30px;
        }

        .danger-zone h3 {
            color: #ff4444;
        }

        .success-message, .error-message {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
        }

        .success-message {
            background: rgba(102, 234, 171, 0.2);
            color: #66eaab;
            border: 2px solid rgba(102, 234, 171, 0.3);
        }

        .error-message {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 2px solid rgba(255, 68, 68, 0.3);
        }

        .user-profile-dropdown {
            position: relative;
            display: inline-block;
        }

        .user-profile-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .user-profile-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .user-avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #667eea;
        }

        .user-avatar-placeholder-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid #667eea;
            color: white;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 110%;
            right: 0;
            background: #1a1a2e;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .dropdown-menu.active {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dropdown-item:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .role-badge-small {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(102, 126, 234, 0.3);
            color: #667eea;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <h1>YTArchive</h1>
        </div>
        <div class="nav-menu">
            <a href="/app" class="nav-link">Library</a>
            <a href="/app#channels" class="nav-link">Channels</a>
            <a href="/app#download" class="nav-link">Download</a>
        </div>
        <div class="nav-user">
            <div class="user-profile-dropdown">
                <button class="user-profile-btn" onclick="toggleDropdown()">
                    <div id="nav-avatar-container">
                        <div class="user-avatar-placeholder-small">U</div>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-start;">
                        <span id="nav-username" style="font-weight: 600;"></span>
                        <span id="nav-role" class="role-badge-small">member</span>
                    </div>
                </button>
                <div class="dropdown-menu" id="dropdown-menu">
                    <a href="/profile" class="dropdown-item" style="background: rgba(102, 126, 234, 0.1);">
                        <span>Profile</span>
                    </a>
                    <a href="/admin" class="dropdown-item" id="nav-admin-link" style="display: none;">
                        <span>Administration</span>
                    </a>
                    <hr style="margin: 0; border: none; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                    <a href="#" class="dropdown-item" onclick="logout(); return false;" style="color: #ff4444;">
                        <span>Logout</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-header">
            <h1>My Profile</h1>
            <p style="color: #aaa; font-size: 18px;">Manage your personal information</p>
        </div>

        <div id="success-msg" class="success-message"></div>
        <div id="error-msg" class="error-message"></div>

        <div class="profile-card">
            <!-- Avatar Section -->
            <div class="avatar-section">
                <div id="avatar-container">
                    <div class="avatar-placeholder">U</div>
                </div>
                <div class="avatar-controls">
                    <h3>Profile Picture</h3>
                    <p style="color: #aaa; margin-bottom: 15px;">Recommended: 400x400px, max 2MB</p>
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                    <div class="avatar-buttons">
                        <button class="btn-upload" onclick="document.getElementById('avatar-input').click()">Upload</button>
                        <button class="btn-remove" id="remove-avatar-btn" onclick="removeAvatar()">Remove</button>
                    </div>
                </div>
            </div>

            <!-- Profile Info -->
            <div class="form-section">
                <h3>Personal Information</h3>
                <form id="profile-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username-field" disabled>
                    </div>
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" id="display-name" placeholder="Your full name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <span class="role-display" id="role-display">MEMBER</span>
                    </div>
                    <button type="submit" class="btn-save">Save Changes</button>
                </form>
            </div>

            <div class="divider"></div>

            <!-- Change Password -->
            <div class="form-section danger-zone">
                <h3>Change Password</h3>
                <form id="password-form">
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="old-password" required>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="new-password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirm-password" required minlength="6">
                    </div>
                    <button type="submit" class="btn-save">Change Password</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = '/';
        }

        let currentUser = null;

        function toggleDropdown() {
            document.getElementById('dropdown-menu').classList.toggle('active');
        }

        window.addEventListener('click', (e) => {
            if (!e.target.closest('.user-profile-dropdown')) {
                document.getElementById('dropdown-menu').classList.remove('active');
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        async function apiCall(endpoint, options = {}) {
            const response = await fetch(endpoint, {
                ...options,
                headers: {
                    ...options.headers,
                    'Authorization': `Bearer ${token}`
                }
            });
            
            if (response.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/';
                return;
            }
            
            return response;
        }

        function showMessage(message, isError = false) {
            const successMsg = document.getElementById('success-msg');
            const errorMsg = document.getElementById('error-msg');
            
            if (isError) {
                errorMsg.textContent = message;
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
            } else {
                successMsg.textContent = message;
                successMsg.style.display = 'block';
                errorMsg.style.display = 'none';
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            setTimeout(() => {
                successMsg.style.display = 'none';
                errorMsg.style.display = 'none';
            }, 5000);
        }

        async function loadProfile() {
            const response = await apiCall('/api/auth/me');
            currentUser = await response.json();
            
            const initial = (currentUser.display_name || currentUser.username).charAt(0).toUpperCase();
            
            // Update navbar
            document.getElementById('nav-username').textContent = currentUser.display_name || currentUser.username;
            document.getElementById('nav-role').textContent = currentUser.role;
            
            if (currentUser.role === 'admin') {
                document.getElementById('nav-admin-link').style.display = 'flex';
            }
            
            // Update navbar avatar
            const navAvatarContainer = document.getElementById('nav-avatar-container');
            if (currentUser.avatar) {
                navAvatarContainer.innerHTML = `<img src="/avatars/${currentUser.avatar}" class="user-avatar-small" alt="Avatar">`;
            } else {
                navAvatarContainer.innerHTML = `<div class="user-avatar-placeholder-small">${initial}</div>`;
            }
            
            // Update form fields
            document.getElementById('username-field').value = currentUser.username;
            document.getElementById('display-name').value = currentUser.display_name || '';
            document.getElementById('email').value = currentUser.email || '';
            document.getElementById('role-display').textContent = currentUser.role.toUpperCase();
            
            // Update main avatar
            const avatarContainer = document.getElementById('avatar-container');
            if (currentUser.avatar) {
                avatarContainer.innerHTML = `<img src="/avatars/${currentUser.avatar}" class="avatar-preview" alt="Avatar">`;
                document.getElementById('remove-avatar-btn').style.display = 'block';
            } else {
                avatarContainer.innerHTML = `<div class="avatar-placeholder">${initial}</div>`;
                document.getElementById('remove-avatar-btn').style.display = 'none';
            }
        }

        // Upload avatar
        document.getElementById('avatar-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            if (file.size > 2 * 1024 * 1024) {
                showMessage('Image too large (max 2MB)', true);
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            const response = await fetch('/api/auth/me/avatar', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });
            
            if (response.ok) {
                showMessage('Avatar updated successfully!');
                loadProfile();
            } else {
                showMessage('Error uploading avatar', true);
            }
        });

        // Remove avatar
        async function removeAvatar() {
            if (!confirm('Remove your avatar?')) return;
            
            const response = await apiCall('/api/auth/me/avatar', {
                method: 'DELETE'
            });
            
            if (response.ok) {
                showMessage('Avatar removed');
                loadProfile();
            }
        }

        // Update profile
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const displayName = document.getElementById('display-name').value;
            const email = document.getElementById('email').value;
            
            const response = await apiCall('/api/auth/me', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    display_name: displayName || null,
                    email: email || null
                })
            });
            
            if (response.ok) {
                showMessage('Profile updated successfully!');
                loadProfile();
            } else {
                showMessage('Error updating profile', true);
            }
        });

        // Change password
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', true);
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters', true);
                return;
            }
            
            const response = await apiCall('/api/auth/me/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    old_password: oldPassword,
                    new_password: newPassword
                })
            });
            
            if (response.ok) {
                showMessage('Password changed successfully!');
                document.getElementById('password-form').reset();
            } else {
                const error = await response.json();
                showMessage(error.detail || 'Error changing password', true);
            }
        });

        loadProfile();
    </script>
</body>
</html>
