<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTArchive - Admin Panel</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100());
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .users-table {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(102, 126, 234, 0.2);
        }

        th {
            padding: 20px;
            text-align: left;
            font-weight: 600;
            color: #667eea;
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
        }

        td {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tbody tr {
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #667eea;
        }

        .user-avatar-placeholder {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            border: 2px solid #667eea;
            color: white;
        }

        .role-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-admin {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .role-member {
            background: rgba(102, 234, 171, 0.2);
            color: #66eaab;
            border: 1px solid rgba(102, 234, 171, 0.3);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            transform: translateY(-2px);
        }

        .btn-edit {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .btn-edit:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .btn-delete {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .btn-delete:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        .user-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .user-modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            font-size: 28px;
            color: #667eea;
        }

        .modal-close {
            background: rgba(255, 68, 68, 0.8);
            border: 2px solid #ff4444;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #ff4444;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #aaa;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-primary {
            flex: 1;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .user-profile-dropdown {
            position: relative;
            display: inline-block;
        }

        .user-profile-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .user-profile-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .user-avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #667eea;
        }

        .user-avatar-placeholder-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid #667eea;
            color: white;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 110%;
            right: 0;
            background: #1a1a2e;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .dropdown-menu.active {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dropdown-item:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .role-badge-small {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(102, 126, 234, 0.3);
            color: #667eea;
        }

        .role-badge-small.admin {
            background: rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <h1>YTArchive Admin</h1>
        </div>
        <div class="nav-menu">
            <a href="/app" class="nav-link">Library</a>
            <a href="/app#channels" class="nav-link">Channels</a>
            <a href="/app#download" class="nav-link">Download</a>
        </div>
        <div class="nav-user">
            <div class="user-profile-dropdown">
                <button class="user-profile-btn" onclick="toggleDropdown()">
                    <div id="nav-avatar-container">
                        <div class="user-avatar-placeholder-small">A</div>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-start;">
                        <span id="nav-username" style="font-weight: 600;"></span>
                        <span id="nav-role" class="role-badge-small admin">admin</span>
                    </div>
                </button>
                <div class="dropdown-menu" id="dropdown-menu">
                    <a href="/profile" class="dropdown-item">Profile</a>
                    <a href="/admin" class="dropdown-item" style="background: rgba(102, 126, 234, 0.1);">Administration</a>
                    <hr style="margin: 0; border: none; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                    <a href="#" class="dropdown-item" onclick="logout(); return false;" style="color: #ff4444;">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="page-header">
            <div>
                <h1>User Management</h1>
                <p style="color: #aaa; margin-top: 10px; font-size: 18px;">Manage accounts and permissions</p>
            </div>
            <button class="btn-primary" onclick="openCreateUserModal()" style="width: auto; padding: 15px 30px;">Create User</button>
        </div>

        <div class="users-table">
            <table>
                <thead>
                    <tr>
                        <th>Avatar</th>
                        <th>Username</th>
                        <th>Display Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Created</th>
                        <th>Last Login</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-list"></tbody>
            </table>
        </div>
    </div>

    <div class="user-modal" id="user-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Create User</h2>
                <button class="modal-close" onclick="closeUserModal()">&times;</button>
            </div>
            <form id="user-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="form-username" required>
                </div>
                <div class="form-group" id="password-group">
                    <label>Password</label>
                    <input type="password" id="form-password">
                </div>
                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" id="form-display-name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="form-email">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="form-role">
                        <option value="member">Member</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeUserModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="form-submit">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        if (!token) window.location.href = '/';
        let editingUser = null;

        function toggleDropdown() {
            document.getElementById('dropdown-menu').classList.toggle('active');
        }
        window.addEventListener('click', (e) => {
            if (!e.target.closest('.user-profile-dropdown')) {
                document.getElementById('dropdown-menu').classList.remove('active');
            }
        });
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        async function loadNavProfile() {
            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const user = await response.json();
                    const initial = (user.display_name || user.username).charAt(0).toUpperCase();
                    document.getElementById('nav-username').textContent = user.display_name || user.username;
                    if (user.avatar) {
                        document.getElementById('nav-avatar-container').innerHTML = 
                            `<img src="/avatars/${user.avatar}" class="user-avatar-small" alt="Avatar">`;
                    } else {
                        document.getElementById('nav-avatar-container').innerHTML = 
                            `<div class="user-avatar-placeholder-small">${initial}</div>`;
                    }
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function apiCall(endpoint, options = {}) {
            const response = await fetch(endpoint, {
                ...options,
                headers: {
                    ...options.headers,
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            if (response.status === 401 || response.status === 403) {
                alert('Access denied');
                window.location.href = '/app';
                return;
            }
            return response.json();
        }

        async function loadUsers() {
            const users = await apiCall('/api/auth/admin/users');
            const tbody = document.getElementById('users-list');
            tbody.innerHTML = users.map(user => {
                const initial = (user.display_name || user.username).charAt(0).toUpperCase();
                return `
                <tr>
                    <td>
                        ${user.avatar ? 
                            `<img src="/avatars/${user.avatar}" class="user-avatar" alt="${user.username}">` :
                            `<div class="user-avatar-placeholder">${initial}</div>`
                        }
                    </td>
                    <td><strong>${user.username}</strong></td>
                    <td>${user.display_name || '-'}</td>
                    <td>${user.email || '-'}</td>
                    <td><span class="role-badge role-${user.role}">${user.role}</span></td>
                    <td>${new Date(user.created_at).toLocaleDateString('fr-FR')}</td>
                    <td>${user.last_login ? new Date(user.last_login).toLocaleDateString('fr-FR') : 'Never'}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-action btn-edit" onclick="editUser('${user.username}')">Edit</button>
                            ${user.username !== username ? 
                                `<button class="btn-action btn-delete" onclick="deleteUser('${user.username}')">Delete</button>` : ''
                            }
                        </div>
                    </td>
                </tr>
            `}).join('');
        }

        function openCreateUserModal() {
            editingUser = null;
            document.getElementById('modal-title').textContent = 'Create User';
            document.getElementById('form-submit').textContent = 'Create';
            document.getElementById('password-group').style.display = 'block';
            document.getElementById('form-username').disabled = false;
            document.getElementById('user-form').reset();
            document.getElementById('user-modal').classList.add('active');
        }

        async function editUser(username) {
            const user = await apiCall(`/api/auth/admin/users/${username}`);
            editingUser = username;
            document.getElementById('modal-title').textContent = 'Edit User';
            document.getElementById('form-submit').textContent = 'Save';
            document.getElementById('password-group').style.display = 'none';
            document.getElementById('form-username').value = user.username;
            document.getElementById('form-username').disabled = true;
            document.getElementById('form-display-name').value = user.display_name || '';
            document.getElementById('form-email').value = user.email || '';
            document.getElementById('form-role').value = user.role;
            document.getElementById('user-modal').classList.add('active');
        }

        function closeUserModal() {
            document.getElementById('user-modal').classList.remove('active');
            editingUser = null;
        }

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('form-username').value;
            const password = document.getElementById('form-password').value;
            const displayName = document.getElementById('form-display-name').value;
            const email = document.getElementById('form-email').value;
            const role = document.getElementById('form-role').value;
            
            if (editingUser) {
                await apiCall(`/api/auth/admin/users/${editingUser}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        display_name: displayName || null,
                        email: email || null,
                        role: role
                    })
                });
            } else {
                if (!password) {
                    alert('Password required');
                    return;
                }
                await apiCall('/api/auth/admin/users', {
                    method: 'POST',
                    body: JSON.stringify({
                        username, password,
                        display_name: displayName || null,
                        email: email || null,
                        role
                    })
                });
            }
            closeUserModal();
            loadUsers();
        });

        async function deleteUser(username) {
            if (!confirm(`Delete user ${username}?`)) return;
            await apiCall(`/api/auth/admin/users/${username}`, { method: 'DELETE' });
            loadUsers();
        }

        loadNavProfile();
        loadUsers();
    </script>
</body>
</html>
