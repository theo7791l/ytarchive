version: '3.8'

services:
  ytarchive:
    build: .
    container_name: ytarchive
    ports:
      - "8000:8000"
    volumes:
      - ./videos:/app/videos
      - ./library.json:/app/library.json
      - ./channels.json:/app/channels.json
      - ./users.json:/app/users.json
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - MAX_DOWNLOAD_SIZE_GB=10
      - SCHEDULER_INTERVAL_HOURS=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  videos:
  data: